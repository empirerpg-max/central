<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><link rel="stylesheet" href="style.css"></head>
<body>
<header><h1 id="title">Charts</h1></header>
<div class="filters"><select id="dateS" onchange="load()"></select></div>
<div id="app"></div>
<script>
    const API = "URL_DO_SEU_SCRIPT_AQUI/exec";
    const TAB = new URLSearchParams(window.location.search).get('tab') || 'HOT 100';
    document.getElementById('title').innerText = TAB;

    async function init() {
        const f = await fetch(`${API}?action=getFilterData&tab=${TAB}`).then(r => r.json());
        document.getElementById('dateS').innerHTML = f.dates.map(d => `<option value="${d}">${d}</option>`).join('');
        load();
    }
    async function load() {
        const d = document.getElementById('dateS').value;
        const res = await fetch(`${API}?action=getChartData&tab=${TAB}&date=${d}`).then(r => r.json());
        document.getElementById('app').innerHTML = res.map(i => `<div class="chart-row"><div class="rank">#${i.pos}</div><img src="${i.capa}"><div><b>${i.titulo}</b><br><small>${i.art}</small></div><div style="text-align:right;"><b>${i.sem}</b><br><small>TOTAL: ${i.tot}</small></div></div>`).join('');
    }
    init();
</script>
</body>
</html>
