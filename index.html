<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire Oficial - Central</title>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --empire: #8a2be2; --bg: #050505; --card: #111; --sp: #1DB954; --am: #FA243C; --yt: #FF0000; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; }
        
        header { padding: 40px 20px; text-align: center; background: linear-gradient(to bottom, #1a0a2e, var(--bg)); border-bottom: 2px solid var(--empire); }
        .logo { width: 80px; filter: drop-shadow(0 0 10px var(--empire)); margin-bottom: 10px; }
        h1 { font-family: 'Figtree'; font-size: 28px; margin: 0; text-transform: uppercase; }

        nav { display: flex; overflow-x: auto; background: #111; padding: 12px; gap: 10px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; justify-content: center; }
        nav a { color: #888; text-decoration: none; font-size: 13px; font-weight: 700; padding: 8px 18px; border-radius: 20px; white-space: nowrap; transition: 0.3s; border: 1px solid transparent; }
        nav a.active { background: var(--empire); color: white; border-color: var(--empire); }

        #app { padding: 20px; max-width: 1200px; margin: 0 auto; }

        /* Real-Time Grid */
        .rt-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .col { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #222; }
        .col-h { padding: 15px; font-weight: 900; text-align: center; text-transform: uppercase; font-family: 'Figtree'; }
        .item { display: grid; grid-template-columns: 35px 45px 1fr 90px; align-items: center; padding: 10px; border-bottom: 1px solid #1a1a1a; }
        .cover { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; }
        .val { text-align: right; font-weight: 700; font-family: monospace; font-size: 13px; }

        /* Monthly Profile */
        .banner { height: 320px; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding: 30px; position: relative; border-radius: 15px; margin-bottom: 30px; overflow: hidden; }
        .banner::after { content: ''; position: absolute; inset: 0; background: linear-gradient(transparent, #000); }
        .banner-c { position: relative; z-index: 2; }
        .art-name { font-size: 60px; font-weight: 900; margin: 0; font-family: 'Figtree'; letter-spacing: -3px; }
        
        .filters { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
        select { background: #222; color: white; border: 1px solid #444; padding: 12px; border-radius: 10px; outline: none; cursor: pointer; font-weight: 600; }

        .m-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        h3 { border-bottom: 2px solid var(--empire); padding-bottom: 10px; margin-bottom: 20px; font-family: 'Figtree'; }

        .sp-t { color: var(--sp); } .am-t { color: var(--am); }
        .sp-b { background: var(--sp); color: black; } .am-b { background: #fff; color: var(--am); } .yt-b { background: var(--yt); color: white; }

        @media (max-width: 600px) { .art-name { font-size: 40px; } nav { justify-content: flex-start; } }
    </style>
</head>
<body>

<header>
    <img src="https://i.imgur.com/8N69f3I.png" class="logo"> <h1>Empire Charts</h1>
</header>

<nav>
    <a href="#" onclick="loadPage('realtime')" id="btn-realtime">Previsões</a>
    <a href="#" onclick="loadPage('spotify')" id="btn-spotify">Spotify</a>
    <a href="#" onclick="loadPage('apple')" id="btn-apple">Apple Music</a>
    <a href="#" onclick="loadPage('youtube')" id="btn-youtube">YouTube</a>
</nav>

<div id="app"></div>

<script>
    // ⚠️ COLOQUE SEU LINK DO APPS SCRIPT AQUI EMBAIXO
    const API = "https://script.google.com/macros/s/AKfycbyDQK3x0fU5V6qnFgtRyf8IPTNPDm2eeQsvZRwmHnCb_sCKLyc8wuwhuNZxEWjGEiYe/exec";

    async function loadPage(page) {
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
        document.getElementById('btn-' + page).classList.add('active');
        
        const app = document.getElementById('app');
        app.innerHTML = "<p style='text-align:center; padding:50px;'>Invocando dados do Empire...</p>";

        if (page === 'realtime') renderRealTime();
        else if (page === 'spotify') renderMonthly('SPOTIFY');
        else if (page === 'apple') renderMonthly('APPLE MUSIC');
        else if (page === 'youtube') renderMonthly('YOUTUBE');
    }

    async function renderRealTime() {
        try {
            const res = await fetch(`${API}?action=getRealTime`);
            const d = await res.json();
            const row = (list, colorClass) => list.map(i => `
                <div class="item">
                    <div style="color:#444; text-align:center;">${i.posicao}</div>
                    <img src="${i.capa}" class="cover" onerror="this.src='https://via.placeholder.com/40'">
                    <div style="padding-left:12px; font-size:13px; font-weight:700;">${i.titulo}</div>
                    <div class="val ${colorClass}">${i.streams}</div>
                </div>`).join('');

            document.getElementById('app').innerHTML = `
                <div class="rt-grid">
                    <div class="col"><div class="col-h sp-b">Spotify</div>${row(d.spotify, 'sp-t')}</div>
                    <div class="col"><div class="col-h am-b">Apple Music</div>${row(d.apple, 'am-t')}</div>
                    <div class="col"><div class="col-h yt-b">YouTube</div>${row(d.youtube, '')}</div>
                </div>`;
        } catch (e) { document.getElementById('app').innerHTML = "Erro ao carregar Previsões."; }
    }

    async function renderMonthly(platform) {
        const years = await fetch(`${API}?action=getMonthlyYears`).then(r => r.json());
        document.getElementById('app').innerHTML = `
            <div class="filters">
                <select id="yS" onchange="updateMonths('${platform}')">${years.map(y => `<option value="${y}">${y}</option>`).join('')}</select>
                <select id="mS" onchange="updateArtists('${platform}')"></select>
                <select id="aS" onchange="getStats('${platform}')"></select>
            </div>
            <div id="stats-area"></div>`;
        updateMonths(platform);
    }

    async function updateMonths(p) {
        const y = document.getElementById('yS').value;
        const months = await fetch(`${API}?action=getMonthlyDates&year=${y}`).then(r => r.json());
        const mS = document.getElementById('mS');
        mS.innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
        updateArtists(p);
    }

    async function updateArtists(p) {
        const y = document.getElementById('yS').value;
        const m = document.getElementById('mS').value;
        const artists = await fetch(`${API}?action=getArtists&platform=${p}&month=${m}&year=${y}`).then(r => r.json());
        const aS = document.getElementById('aS');
        aS.innerHTML = artists.map(a => `<option value="${a}">${a}</option>`).join('');
        getStats(p);
    }

    async function getStats(p) {
        const y = document.getElementById('yS').value;
        const m = document.getElementById('mS').value;
        const a = document.getElementById('aS').value;
        const data = await fetch(`${API}?action=getMonthlyStats&platform=${p}&month=${m}&artist=${a}&year=${y}`).then(r => r.json());
        const art = data[0];
        const textClass = p === 'SPOTIFY' ? 'sp-t' : (p === 'APPLE MUSIC' ? 'am-t' : '');

        document.getElementById('stats-area').innerHTML = `
            <div class="banner" style="background-image:url('${art.capaArtista}')">
                <div class="banner-c">
                    <h2 class="art-name">${art.nome}</h2>
                    <p style="font-weight:700; font-size:18px;" class="${textClass}">${art.totalOuvintes} ouvintes mensais</p>
                </div>
            </div>
            <div class="m-grid">
                <div>
                    <h3>Músicas Populares</h3>
                    ${art.musicas.map((mus, i) => `
                        <div class="item">
                            <div style="color:#555;">${i+1}</div>
                            <img src="${mus.capaMusica}" class="cover" onerror="this.src='https://via.placeholder.com/40'">
                            <div style="padding-left:12px; font-weight:700;">${mus.titulo}</div>
                            <div class="val ${textClass}">${mus.streams}</div>
                        </div>
                    `).join('')}
                </div>
                <div>
                    <h3>Sobre o Artista</h3>
                    <p style="line-height:1.6; color:#aaa;">${art.sobre}</p>
                </div>
            </div>`;
    }

    window.onload = () => loadPage('realtime');
</script>
</body>
</html>
