<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire Charts - Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --empire: #8a2be2; --bg: #050505; --card: #121212; --border: rgba(255,255,255,0.1); --sp: #1DB954; --am: #FA243C; --yt: #FF0000; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        header { padding: 40px 20px; text-align: center; background: radial-gradient(circle at top, #1a0a2e, #050505); border-bottom: 2px solid var(--empire); }
        h1 { font-family: 'Figtree'; font-weight: 900; text-transform: uppercase; letter-spacing: 4px; margin: 0; filter: drop-shadow(0 0 10px var(--empire)); }

        /* NAVEGAÇÃO / SUBMENUS */
        nav { background: #0a0a0a; display: flex; justify-content: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        .menu-item { position: relative; padding: 18px 25px; cursor: pointer; font-size: 11px; font-weight: 700; text-transform: uppercase; color: #888; transition: 0.3s; }
        .menu-item:hover { color: var(--empire); background: rgba(255,255,255,0.05); }
        .submenu { display: none; position: absolute; top: 100%; left: 0; background: #0a0a0a; border: 1px solid var(--border); min-width: 220px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .menu-item:hover .submenu { display: block; }
        .sub-btn { padding: 12px 20px; font-size: 10px; color: #bbb; border-bottom: 1px solid var(--border); display: block; text-decoration: none; transition: 0.2s; }
        .sub-btn:hover { background: var(--empire); color: white; }

        #app { padding: 30px 20px; max-width: 1200px; margin: 0 auto; min-height: 60vh; }
        .filters { display: flex; gap: 10px; justify-content: center; margin-bottom: 40px; flex-wrap: wrap; }
        select { background: #111; color: white; border: 1px solid var(--border); padding: 10px 20px; border-radius: 20px; font-weight: 600; outline: none; cursor: pointer; }

        /* TABELAS / CARDS */
        .chart-row { display: grid; grid-template-columns: 60px 70px 1fr 140px; align-items: center; padding: 15px; background: rgba(255,255,255,0.03); margin-bottom: 8px; border-radius: 12px; border: 1px solid var(--border); }
        .chart-row img { width: 55px; height: 55px; border-radius: 6px; }
        .rank { font-family: 'Figtree'; font-size: 26px; font-weight: 900; color: var(--empire); text-align: center; }

        /* REAL TIME GRID */
        .rt-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .rt-col { background: #111; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
        .rt-head { padding: 15px; text-align: center; font-weight: 900; letter-spacing: 1px; font-family: 'Figtree'; }
        .rt-item { display: grid; grid-template-columns: 35px 45px 1fr 90px; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }

        /* PERFIL MENSAL */
        .banner { height: 350px; background-size: cover; background-position: center; border-radius: 30px; display: flex; align-items: flex-end; padding: 50px; position: relative; margin-bottom: 40px; overflow: hidden; border: 1px solid var(--border); }
        .banner::after { content: ''; position: absolute; inset: 0; background: linear-gradient(transparent, #050505); }
        .banner-c { position: relative; z-index: 2; }
        .art-name { font-size: clamp(40px, 8vw, 80px); font-weight: 900; margin: 0; font-family: 'Figtree'; text-transform: uppercase; letter-spacing: -3px; }
        .badge { background: var(--empire); padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: 800; }

        .loader { border: 4px solid #333; border-top: 4px solid var(--empire); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 100px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) { .chart-row { grid-template-columns: 40px 60px 1fr 90px; padding: 10px; font-size: 12px; } }
    </style>
</head>
<body>

<header><h1>Empire Charts</h1></header>

<nav>
    <div class="menu-item" onclick="loadRealTime()">Real Time</div>
    <div class="menu-item">Billboard
        <div class="submenu">
            <div class="sub-btn" onclick="initChart('BILLBOARD HOT 100')">Hot 100</div>
            <div class="sub-btn" onclick="initChart('BILLBOARD HOT 100', true)">Hot 100 by Style</div>
            <div class="sub-btn" onclick="initChart('DADOS ÁLBUNS')">Billboard 200</div>
            <div class="sub-btn" onclick="initChart('DADOS ÁLBUNS', true)">B200 by Style</div>
            <div class="sub-btn" onclick="initChart('DIGITAL SALES')">Digital Sales</div>
        </div>
    </div>
    <div class="menu-item">Spotify
        <div class="submenu">
            <div class="sub-btn" onclick="initChart('SPOTIFY')">Global Chart</div>
            <div class="sub-btn" onclick="initCountry('SPOTIFY COUNTRIES')">By Country</div>
            <div class="sub-btn" onclick="initMonthly('SPOTIFY')">Monthly Listeners</div>
        </div>
    </div>
    <div class="menu-item">Apple
        <div class="submenu">
            <div class="sub-btn" onclick="initChart('APPLE MUSIC')">Global Chart</div>
            <div class="sub-btn" onclick="initCountry('APPLE MUSIC COUNTRIES')">By Country</div>
            <div class="sub-btn" onclick="initMonthly('APPLE MUSIC')">Monthly Listeners</div>
        </div>
    </div>
    <div class="menu-item">YouTube
        <div class="submenu">
            <div class="sub-btn" onclick="initChart('YOUTUBE')">Global Chart</div>
            <div class="sub-btn" onclick="initCountry('YOUTUBE COUNTRIES')">By Country</div>
            <div class="sub-btn" onclick="initMonthly('YOUTUBE')">Monthly Listeners</div>
        </div>
    </div>
</nav>

<div id="app"></div>

<script>
    // ⚠️ COLOQUE SEU LINK /exec AQUI
    const API = "https://script.google.com/macros/s/AKfycbyDQK3x0fU5V6qnFgtRyf8IPTNPDm2eeQsvZRwmHnCb_sCKLyc8wuwhuNZxEWjGEiYe/exec";

    const app = document.getElementById('app');
    const loading = () => app.innerHTML = '<div class="loader"></div>';

    // --- REAL TIME ---
    async function loadRealTime() {
        loading();
        const d = await fetch(API + "?action=getRealTime").then(r => r.json());
        const row = (l, c) => l.map(i => `
            <div class="rt-item">
                <div style="color:#555; font-weight:900;">${i.p}</div>
                <img src="${i.c}" style="width:40px; height:40px; border-radius:4px;">
                <div style="padding-left:10px; font-weight:700;">${i.t}</div>
                <div style="text-align:right; font-weight:900; color:${c}">${i.s}</div>
            </div>`).join('');
        app.innerHTML = `
            <div class="rt-grid">
                <div class="rt-col"><div class="rt-head" style="background:var(--sp); color:black;">SPOTIFY</div>${row(d.spotify, 'var(--sp)')}</div>
                <div class="rt-col"><div class="rt-head" style="background:#fff; color:var(--am);">APPLE MUSIC</div>${row(d.apple, 'var(--am)')}</div>
                <div class="rt-col"><div class="rt-head" style="background:var(--yt); color:#fff;">YOUTUBE</div>${row(d.youtube, '#fff')}</div>
            </div>`;
    }

    // --- CHARTS GERAIS ---
    async function initChart(tab, hasStyle = false) {
        loading();
        const f = await fetch(`${API}?action=getFilterData&tab=${tab}`).then(r => r.json());
        app.innerHTML = `
            <div class="filters">
                <select id="dateS" onchange="renderChart('${tab}')">${f.dates.map(d => `<option value="${d}">${d}</option>`).join('')}</select>
                ${hasStyle ? `<select id="styleS" onchange="renderChart('${tab}')"><option value="">Todos os Estilos</option>${f.styles.map(s => `<option value="${s}">${s}</option>`).join('')}</select>` : ''}
            </div><div id="chart-area"></div>`;
        renderChart(tab);
    }

    async function renderChart(tab) {
        const d = document.getElementById('dateS').value;
        const s = document.getElementById('styleS')?.value || "";
        const res = await fetch(`${API}?action=getChartData&tab=${tab}&date=${d}&style=${s}`).then(r => r.json());
        document.getElementById('chart-area').innerHTML = res.map(i => `
            <div class="chart-row">
                <div class="rank">#${i.pos}</div>
                <img src="${i.capa}">
                <div style="padding-left:20px;"><b>${i.tit}</b><br><small style="color:#888;">${i.art}</small></div>
                <div style="text-align:right;"><b>${i.sem}</b><br><small style="color:var(--empire);">TOTAL: ${i.tot}</small></div>
            </div>`).join('');
    }

    // --- PAÍSES ---
    async function initCountry(tab) {
        loading();
        const f = await fetch(`${API}?action=getFilterData&tab=${tab}`).then(r => r.json());
        app.innerHTML = `
            <div class="filters">
                <select id="countryS" onchange="renderCountry('${tab}')">${f.countries.map(c => `<option value="${c}">${c}</option>`).join('')}</select>
                <select id="dateS" onchange="renderCountry('${tab}')">${f.dates.map(d => `<option value="${d}">${d}</option>`).join('')}</select>
            </div><div id="chart-area"></div>`;
        renderCountry(tab);
    }

    async function renderCountry(tab) {
        const c = document.getElementById('countryS').value;
        const d = document.getElementById('dateS').value;
        const res = await fetch(`${API}?action=getCountryData&tab=${tab}&country=${c}&date=${d}`).then(r => r.json());
        document.getElementById('chart-area').innerHTML = res.map(i => `
            <div class="chart-row">
                <div class="rank">#${i.pos}</div>
                <img src="${i.capa}">
                <div style="padding-left:20px;"><b>${i.tit}</b><br><small style="color:#888;">${i.art}</small></div>
                <div style="text-align:right; font-weight:900; color:var(--sp);">${i.val}</div>
            </div>`).join('');
    }

    // --- MENSAL ---
    async function initMonthly(p) {
        loading();
        const y = await fetch(API + "?action=getMonthlyYears").then(r => r.json());
        app.innerHTML = `
            <div class="filters">
                <select id="yS" onchange="upM('${p}')">${y.map(v => `<option value="${v}">${v}</option>`).join('')}</select>
                <select id="mS" onchange="upA('${p}')"></select>
                <select id="aS" onchange="renderM('${p}')"></select>
            </div><div id="profile"></div>`;
        upM(p);
    }

    async function upM(p) {
        const y = document.getElementById('yS').value;
        const m = await fetch(`${API}?action=getMonthlyDates&year=${y}`).then(r => r.json());
        document.getElementById('mS').innerHTML = m.map(v => `<option value="${v}">${v}</option>`).join('');
        upA(p);
    }

    async function upA(p) {
        const y = document.getElementById('yS').value;
        const m = document.getElementById('mS').value;
        const a = await fetch(`${API}?action=getArtists&platform=${p}&month=${m}&year=${y}`).then(r => r.json());
        document.getElementById('aS').innerHTML = a.map(v => `<option value="${v}">${v}</option>`).join('');
        renderM(p);
    }

    async function renderM(p) {
        const y = document.getElementById('yS').value;
        const m = document.getElementById('mS').value;
        const a = document.getElementById('aS').value;
        const data = await fetch(`${API}?action=getMonthlyStats&platform=${p}&month=${m}&artist=${a}&year=${y}`).then(r => r.json());
        const art = data[0];
        const cl = p === 'SPOTIFY' ? 'var(--sp)' : (p === 'APPLE MUSIC' ? 'var(--am)' : '#fff');
        
        document.getElementById('profile').innerHTML = `
            <div class="banner" style="background-image:url('${art.capaArt}')">
                <div class="banner-c">
                    ${art.rank !== '-' ? `<span class="badge">TOP ${art.rank} MENSAL</span>` : ''}
                    <h2 class="art-name">${art.nome}</h2>
                    <p style="font-weight:900; font-size:22px; color:${cl}">${art.ouvintes} ouvintes mensais</p>
                </div>
            </div>
            <div style="display:grid; grid-template-columns: 2fr 1.2fr; gap:40px;">
                <div><h3>Músicas Populares</h3>
                ${art.musicas.map((mus, i) => `<div class="chart-row" style="background:transparent; border:none; border-bottom:1px solid #222; border-radius:0;"><div class="rank" style="font-size:18px;">${i+1}</div><img src="${mus.c}"><div style="padding-left:15px;"><b>${mus.t}</b></div><div style="text-align:right; color:${cl}; font-weight:800;">${mus.s}</div></div>`).join('')}</div>
                <div><h3>Sobre o Artista</h3><p style="color:#aaa; line-height:1.8;">${art.bio}</p></div>
            </div>`;
    }

    window.onload = loadRealTime;
</script>
</body>
</html>
