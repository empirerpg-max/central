<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><title>Empire - Real Time</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<header><h1>Empire Charts</h1></header>
<nav>
    <a href="index.html" class="menu-item">Real Time</a>
    <div class="menu-item">Billboard
        <div class="submenu">
            <a href="charts.html?tab=HOT 100" class="submenu-item">Hot 100</a>
            <a href="charts.html?tab=MusicStyle" class="submenu-item">By Style</a>
            <a href="charts.html?tab=DADOS ÁLBUNS" class="submenu-item">Billboard 200</a>
        </div>
    </div>
    <div class="menu-item">Spotify
        <div class="submenu">
            <a href="charts.html?tab=Spotify" class="submenu-item">Global</a>
            <a href="countries.html?tab=SpotifyCountry" class="submenu-item">By Country</a>
            <a href="monthly.html?p=SPOTIFY" class="submenu-item">Artists</a>
        </div>
    </div>
    </nav>
<div id="app" style="padding:20px; display:grid; grid-template-columns:repeat(auto-fit, minmax(320px, 1fr)); gap:20px;"></div>
<script>
    const API = "https://script.google.com/macros/s/AKfycbyDQK3x0fU5V6qnFgtRyf8IPTNPDm2eeQsvZRwmHnCb_sCKLyc8wuwhuNZxEWjGEiYe/exec";
    async function load() {
        const d = await fetch(API + "?action=getRealTime").then(r => r.json());
        const render = (list, color) => list.map(i => `<div class="chart-row" style="grid-template-columns:30px 40px 1fr 90px; background:transparent;"><div style="color:#444;">${i.posicao}</div><img src="${i.capa}" style="width:35px;height:35px;"><div style="padding:0 10px; font-size:12px; font-weight:700;">${i.titulo}</div><div style="text-align:right; color:${color}; font-weight:700;">${i.streams}</div></div>`).join('');
        document.getElementById('app').innerHTML = `
            <div style="background:#111; border-radius:12px; overflow:hidden;"><div style="padding:15px; background:var(--sp); color:black; font-weight:900; text-align:center;">SPOTIFY</div>${render(d.spotify, 'var(--sp)')}</div>
            <div style="background:#111; border-radius:12px; overflow:hidden;"><div style="padding:15px; background:white; color:var(--am); font-weight:900; text-align:center;">APPLE MUSIC</div>${render(d.apple, 'var(--am)')}</div>
            <div style="background:#111; border-radius:12px; overflow:hidden;"><div style="padding:15px; background:var(--yt); color:white; font-weight:900; text-align:center;">YOUTUBE</div>${render(d.youtube, 'white')}</div>`;
    }
    load();
</script>
</body>
</html>
